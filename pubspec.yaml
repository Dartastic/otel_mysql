name: otel_mysql
description: >-
  OpenTelemetry instrumentation for package:mysql_client. Wraps MySQL query execution in CLIENT-kind spans following OTel stable semantic conventions (db.system.name=mysql, db.operation.name, db.collection.name, db.namespace, db.query.text).
version: 0.1.0-beta.1-wip
repository: https://github.com/dartastic/otel_mysql
homepage: https://dartastic.io

environment:
  sdk: ^3.0.0

dependencies:
  dartastic_opentelemetry: ^1.1.0-beta.5
  dartastic_opentelemetry_api: ^1.0.0-beta.6
  mysql_client: ^0.0.27

dev_dependencies:
  dart_flutter_team_lints: ^3.5.2
  pub_semver: ^2.0.0
  pubspec_parse: ^1.5.0
  test: ^1.26.3
